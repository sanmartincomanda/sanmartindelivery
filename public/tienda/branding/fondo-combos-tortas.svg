      <path d="M24 64 C108 96 226 95 320 60 L320 98 C214 126 106 124 24 100 Z" fill="#fff7ef" opacity="0.12"/>
      <rect x="44" y="92" width="136" height="18" rx="9" fill="#fff7ef" opacity="0.82"/>
      <rect x="44" y="132" width="200" height="18" rx="9" fill="#fff7ef" opacity="0.62"/>
      <rect x="44" y="174" width="156" height="18" rx="9" fill="#fff7ef" opacity="0.46"/>
