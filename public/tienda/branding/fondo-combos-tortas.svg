<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fondo vectorial Carnes San Martin</title>
  <desc id="desc">Fondo rojo suave con ilustraciones vectoriales de tortas, hamburguesa, tabla y detalles decorativos sin texto.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f0d1d"/>
      <stop offset="0.48" stop-color="#a8192a"/>
      <stop offset="1" stop-color="#d94a3f"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="32%" cy="52%" r="70%">
      <stop offset="0" stop-color="#f2a36d" stop-opacity="0.2"/>
      <stop offset="0.48" stop-color="#c43d35" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3c0710" stop-opacity="0.36"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c58645"/>
      <stop offset="0.5" stop-color="#8e5029"/>
      <stop offset="1" stop-color="#4a2416"/>
    </linearGradient>
    <linearGradient id="packetA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8703a"/>
      <stop offset="0.52" stop-color="#8e3326"/>
      <stop offset="1" stop-color="#2b1819"/>
    </linearGradient>
    <linearGradient id="packetB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c2028"/>
      <stop offset="0.58" stop-color="#552026"/>
      <stop offset="1" stop-color="#241719"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#f0ddc6"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#24060a" flood-opacity="0.28"/>
    </filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1"/>
      </feComponentTransfer>
    </filter>
    <pattern id="waves" width="116" height="116" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <path d="M-10 58 C14 31 42 31 66 58 S118 85 142 58" fill="none" stroke="#651020" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
      <path d="M-10 86 C14 59 42 59 66 86 S118 113 142 86" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.08"/>
    </pattern>
    <g id="ringLogo">
      <circle cx="0" cy="0" r="58" fill="none" stroke="#f43232" stroke-width="34"/>
    </g>
    <g id="spark" fill="none" stroke="#fff7ef" stroke-linecap="round" stroke-linejoin="round" opacity="0.62">
      <path d="M0 0 l62 28 l-42 44 z" stroke-width="7"/>
      <path d="M11 20 l34 13 M7 43 l28 11" stroke-width="4"/>
    </g>
    <g id="meatDoodle" fill="none" stroke="#fff7ef" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.72">
      <path d="M18 63 C34 16 92 12 116 52 C128 73 112 105 76 112 C39 119 7 96 18 63 Z"/>
      <path d="M54 51 C68 35 94 38 100 58"/>
      <path d="M46 82 C65 96 91 91 102 76"/>
    </g>
    <g id="plainFlag" fill="none" stroke="#fff7ef" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <path d="M0 92 V8"/>
      <path d="M4 16 C32 1 62 22 94 8 V58 C63 74 33 51 4 66 Z"/>
      <path d="M22 33 C38 25 54 40 72 31"/>
      <path d="M20 49 C39 42 54 55 77 47"/>
    </g>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#softGlow)"/>
  <rect width="1920" height="1080" fill="url(#waves)" opacity="0.52"/>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.52"/>

  <g opacity="0.22" fill="none" stroke="#4c0714" stroke-width="14" stroke-linecap="round">
