<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fondo combos y tortas Carnes San Martin</title>
  <desc id="desc">Fondo vectorial rojo con tematica de combos, hamburguesas, tortas nuevas y doodles blancos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b071b"/>
      <stop offset="0.45" stop-color="#b41125"/>
      <stop offset="1" stop-color="#ef322b"/>
    </linearGradient>
    <radialGradient id="spot" cx="36%" cy="58%" r="62%">
